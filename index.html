<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>PPE 관리시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR','Malgun Gothic','맑은 고딕',system-ui,sans-serif;background:#eef0f2;color:#333;font-size:13px;}
input,select,button,textarea{font-family:inherit;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#cbd0d6;border-radius:5px;}
::-webkit-scrollbar-track{background:transparent;}
button{cursor:pointer;}

#app{display:flex;min-height:100vh;}

/* Sidebar */
#sidebar{width:232px;flex:none;background:#222831;display:flex;flex-direction:column;transition:width .15s;position:sticky;top:0;align-self:flex-start;height:100vh;overflow:hidden;}
#sidebar.collapsed{width:62px;}
.sb-logo{height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid #313945;flex:none;}
.sb-logo-icon{width:26px;height:26px;flex:none;background:#F5821F;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;}
.sb-logo-text{color:#fff;font-weight:700;font-size:14px;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 16px;cursor:pointer;color:#aeb6c0;background:transparent;border-left:3px solid transparent;font-weight:500;font-size:13px;transition:background .1s;user-select:none;}
.nav-item:hover{background:rgba(255,255,255,.05);}
.nav-item.active{color:#F5821F;background:rgba(245,130,31,.12);border-left-color:#F5821F;font-weight:700;}
.nav-icon{width:18px;text-align:center;font-size:15px;flex:none;}
.nav-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-ver{padding:12px 16px;border-top:1px solid #313945;font-size:10.5px;color:#7a8694;white-space:nowrap;overflow:hidden;}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}

/* Topbar */
#topbar{height:56px;flex:none;background:#fff;border-bottom:1px solid #e1e4e8;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:5;}
#toggle-sb{cursor:pointer;font-size:18px;color:#6b7785;width:24px;text-align:center;user-select:none;}
.top-title{display:flex;align-items:center;gap:8px;}
.top-marker{color:#F5821F;font-size:9px;}
.top-title-text{font-weight:700;font-size:16px;color:#2b3138;letter-spacing:-.3px;}
.top-spacer{flex:1;}
.sync-chip{display:flex;align-items:center;gap:6px;font-size:11px;color:#8a93a0;padding:5px 11px;background:#f4f6f8;border-radius:20px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2f9e5b;flex:none;}
.bell-wrap{position:relative;cursor:pointer;}
.bell-icon{font-size:18px;color:#6b7785;}
#bell-badge{position:absolute;top:-5px;right:-7px;min-width:16px;height:16px;padding:0 4px;background:#d63b30;color:#fff;font-size:10px;font-weight:700;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.user-wrap{display:flex;align-items:center;gap:9px;padding-left:14px;border-left:1px solid #e8eaed;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:#3a4250;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.user-name{font-size:12.5px;font-weight:700;color:#2b3138;line-height:1.25;}
.user-role{font-size:10.5px;color:#9aa3ac;line-height:1.25;}

/* Content */
#content{flex:1;padding:18px 22px;overflow-y:auto;}

/* Cards */
.card{background:#fff;border:1px solid #e6e8eb;border-radius:5px;}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #eef0f2;flex-wrap:wrap;gap:8px;}
.card-hd-left{display:flex;align-items:center;gap:7px;}
.sec-marker{color:#F5821F;font-size:9px;}
.sec-title{font-weight:700;font-size:14px;color:#2b3138;}
.card-meta{font-size:11px;color:#9aa3ac;}

/* Tables */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:8px 10px;background:#f2f3f5;color:#5b6671;font-weight:600;font-size:11.5px;text-align:left;border-bottom:1px solid #e6e8eb;white-space:nowrap;}
.tbl td{padding:7px 10px;border-bottom:1px solid #f0f1f3;font-size:12.5px;color:#3b424a;}
.tbl th.tc,.tbl td.tc{text-align:center;}

/* Status badge */
.badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:700;}

/* Buttons */
.btn-orange{padding:6px 13px;background:#F5821F;border:none;color:#fff;border-radius:4px;font-size:12px;font-weight:700;}
.btn-orange:hover{background:#e57318;}
.btn-orange-lg{padding:11px;background:#F5821F;border:none;color:#fff;border-radius:5px;font-size:13px;font-weight:700;width:100%;}
.btn-orange-lg:hover{background:#e57318;}
.btn-green{padding:6px 13px;background:#fff;border:1px solid #2f9e5b;color:#2f9e5b;border-radius:4px;font-size:12px;font-weight:700;}
.btn-green:hover{background:#f1f8f3;}

/* Form controls */
.form-select{padding:5px 9px;border:1px solid #d8dce0;border-radius:4px;font-size:11.5px;color:#3b424a;outline:none;background:#fff;}
.form-select:focus{border-color:#F5821F;}
.form-input{padding:6px 9px;border:1px solid #d8dce0;border-radius:4px;font-size:12.5px;color:#3b424a;outline:none;background:#fff;}
.form-input:focus{border-color:#F5821F;}
.form-input-sm{width:80px;padding:6px 8px;border:1px solid #e3e6e9;border-radius:4px;font-size:12.5px;color:#3b424a;outline:none;background:#fff;}
.form-input-sm:focus{border-color:#F5821F;}
.form-input-full{width:100%;padding:6px 8px;border:1px solid #e3e6e9;border-radius:4px;font-size:12.5px;color:#3b424a;outline:none;background:#fff;}
.form-input-full:focus{border-color:#F5821F;}

/* Tabs */
.tab-bar{display:flex;gap:2px;padding:10px 14px 0;border-bottom:1px solid #eef0f2;}
.tab-item{padding:8px 16px;cursor:pointer;font-size:12.5px;font-weight:500;color:#7a8591;border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none;}
.tab-item.active{color:#F5821F;font-weight:700;border-bottom-color:#F5821F;}

/* Toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#222831;color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:500;box-shadow:0 6px 24px rgba(0,0,0,.22);display:none;align-items:center;gap:10px;z-index:100;}
#toast.show{display:flex;}

/* Worker list */
.worker-item{display:flex;flex-direction:column;gap:1px;padding:9px 13px;cursor:pointer;border-bottom:1px solid #f3f4f6;border-left:3px solid transparent;background:#fff;user-select:none;}
.worker-item:hover{background:#fafbfc;}
.worker-item.active{background:#fff6ee;border-left-color:#F5821F;}
.worker-name{font-size:12.5px;font-weight:600;color:#2b3138;}
.worker-item.active .worker-name{color:#F5821F;}
.worker-meta{font-size:10.5px;color:#9aa3ac;}

/* Summary cards */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.sum-card{background:#fff;border:1px solid #e6e8eb;border-radius:5px;padding:15px 17px;}
.sum-label{font-size:12px;color:#7a8591;font-weight:500;}
.sum-val-row{display:flex;align-items:baseline;gap:5px;margin-top:9px;}
.sum-num{font-size:32px;font-weight:800;line-height:1;}
.sum-unit{font-size:13px;color:#9aa3ac;}
.sum-sub{font-size:11px;color:#9aa3ac;margin-top:7px;}

/* Layout helpers */
.flex-col{display:flex;flex-direction:column;}
.gap-14{gap:14px;}
.two-col{display:grid;grid-template-columns:1.65fr 1fr;gap:14px;align-items:start;}
.two-col-eq{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
.two-col-15{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start;}
.personal-grid{display:grid;grid-template-columns:268px 1fr;gap:14px;align-items:start;}
.ov-x{overflow-x:auto;}
.ov-y{overflow-y:auto;}

/* Empty state */
.empty-state{padding:48px 20px;text-align:center;color:#9aa3ac;}
.empty-state .icon{font-size:32px;margin-bottom:12px;}
.empty-state .msg{font-size:13px;line-height:1.6;}

/* Loading overlay */
#loading-overlay{position:fixed;inset:0;background:#eef0f2;display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid #e6e8eb;border-top-color:#F5821F;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-msg{font-size:13px;color:#7a8591;}

/* Error banner */
#err-banner{display:none;position:fixed;top:56px;left:0;right:0;padding:10px 20px;background:#fdecea;border-bottom:1px solid #f5c6c3;color:#c0392b;font-size:12.5px;z-index:50;text-align:center;}
</style>
</head>

<div id="loading-overlay">

</div>

<div id="err-banner"></div>

<div id="app">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">P</div>

      <div class="bell-wrap">

      <div class="user-wrap">

          <div class="user-role">정비 엔지니어</div>
        </div>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="toast">
  <span style="width:8px;height:8px;border-radius:50%;background:#F5821F;flex:none;"></span>

const fmtDate   = d => { const dt = new Date(d); const y = dt.getFullYear(), mo = String(dt.getMonth()+1).padStart(2,'0'), da = String(dt.getDate()).padStart(2,'0'); return y+'-'+mo+'-'+da; };

function checkReady() {
  if (appReady) return;
  if (!Object.values(loaded).every(Boolean)) return;
  appReady = true;
  // pick sensible UI defaults
  if (!state.selectedWorkerId && state.workers.length > 0) state.selectedWorkerId = state.workers[0].id;
  const depts = getDepts();
  if (!state.deptTab || !depts.includes(state.deptTab)) state.deptTab = depts[0] || null;
  document.getElementById('loading-overlay').style.display = 'none';
  renderAll();
}

// ─── debounced re-render ──────────────────────────────────────────────────────

function scheduleRender(fromCollection) {
  // Don't disrupt inline editing on the master screen
  if (appReady && state.screen === 'master' && fromCollection === 'ppeTypes') return;
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => { if (appReady) renderAll(); }, 40);
}

function getDepts() {

// derive for Excel-sourced rows (no Firestore typeId linkage)
function deriveXls(r) {
  const TODAY = today();
  const t = state.ppeTypes.find(x => x.name === r.typeName);
  const isPerf = t ? (t.lifeType === '성능소진형' || t.months === 0) : false;
  const issue = new Date(r.issueDate);
  if (isPerf || !r.expiryDate) {
    return { ...r, issueStr:fmtDate(issue), expiryStr: r.expiryDate || '성능소진시',
      daysLeft:null, dLeftText:'성능소진시', status:'normal', label:'정상', color:'#6b7785', bg:'#f1f3f5', dot:'#aab2bb' };
  }
  const expiry = new Date(r.expiryDate);
  const daysLeft = Math.floor((expiry - TODAY) / 86400000);
  const alarmDays = t ? t.alarmDays : 14;
  let status, label, color, bg, dot;
  if (daysLeft < 0)              { status='expired';  label='경과'; color='#d63b30'; bg='#fdecea'; dot='#d63b30'; }
  else if (daysLeft<=alarmDays)  { status='imminent'; label='임박'; color='#cf7012'; bg='#fff3e3'; dot='#F5821F'; }
  else                           { status='normal';   label='정상'; color='#6b7785'; bg='#f1f3f5'; dot='#aab2bb'; }
  const dLeftText = daysLeft < 0 ? Math.abs(daysLeft)+'일 경과' : daysLeft+'일 남음';
  return { ...r, issueStr:fmtDate(issue), expiryStr:fmtDate(expiry), daysLeft, dLeftText, status, label, color, bg, dot };
}

function derive(r) {
  const TODAY = today();
  const t = state.ppeTypes.find(x => x.id === r.typeId) || { id:r.typeId, name:r.typeId, months:12, alarmDays:14, lifeType:'기간형' };
  const w = state.workers.find(x => x.id === r.workerId) || { id:r.workerId, name:'-', dept:'-', factory:'-', subOrg:'-' };
  const issue = new Date(r.issueDate);
  const isPerf = t.lifeType === '성능소진형' || t.months === 0;
  if (isPerf) {
    return { ...r, typeName:t.name, dept:w.dept, factory:w.factory, subOrg:w.subOrg, name:w.name,
      issueStr:fmtDate(issue), expiryStr:'성능소진시', daysLeft:null, dLeftText:'성능소진시',
      status:'normal', label:'정상', color:'#6b7785', bg:'#f1f3f5', dot:'#aab2bb' };
  }
  const expiry   = addMonths(issue, t.months);
  const daysLeft = Math.floor((expiry - TODAY) / 86400000);
  let status, label, color, bg, dot;
  if (daysLeft < 0)               { status='expired';  label='경과'; color='#d63b30'; bg='#fdecea'; dot='#d63b30'; }
  else if (daysLeft<=t.alarmDays) { status='imminent'; label='임박'; color='#cf7012'; bg='#fff3e3'; dot='#F5821F'; }
  else                            { status='normal';   label='정상'; color='#6b7785'; bg='#f1f3f5'; dot='#aab2bb'; }
  const dLeftText = daysLeft < 0 ? Math.abs(daysLeft)+'일 경과' : daysLeft+'일 남음';
  return { ...r, typeName:t.name, dept:w.dept, factory:w.factory, subOrg:w.subOrg, name:w.name,
    issueStr:fmtDate(issue), expiryStr:fmtDate(expiry), daysLeft, dLeftText, status, label, color, bg, dot };
}

function computed() {
  const allDerived = state.records.map(derive)
    .sort((a,b) => a.issueDate < b.issueDate ? 1 : a.issueDate > b.issueDate ? -1 : 0);
  const curMap = {};
  state.records.forEach(r => {
    const k = r.workerId+'|'+r.typeId;
    if (!curMap[k] || r.issueDate > curMap[k].issueDate) curMap[k] = r;
  });
  const current   = Object.values(curMap).map(derive);
  const curByKey  = {};
  current.forEach(r => { curByKey[r.workerId+'|'+r.typeId] = r; });
  const imminent  = current.filter(r => r.status === 'imminent');
  const expired   = current.filter(r => r.status === 'expired');
  const ym        = fmtDate(new Date()).slice(0,7);                    // YYYY-MM
  const thisMonth = state.records.filter(r => r.issueDate && r.issueDate.startsWith(ym));
  const required  = ['helmet','shoes','goggle'];
  const notRec    = [];
  state.workers.forEach(w => {
    required.forEach(tid => {
      if (!state.records.some(r => r.workerId===w.id && r.typeId===tid)) notRec.push({w,tid});
    });
  });
  return { allDerived, current, curByKey, imminent, expired, thisMonth, notRec,
           bellCount: imminent.length + expired.length };
}

// ─── PERSONAL LEDGER ──────────────────────────────────────────────────────────
function renderPersonal() {
  const q = state.searchPersonal.trim();
  // Merge Firestore + Excel workers (Excel overrides when xlsWorkers is populated)
  const workerPool = state.xlsWorkers.length > 0
    ? [...state.workers, ...state.xlsWorkers.filter(xw => !state.workers.find(w => w.id===xw.id))]
    : state.workers;
  const factoryOptions = [...new Set(workerPool.map(w => w.factory).filter(Boolean))].sort();
  const deptOptions    = [...new Set(workerPool
    .filter(w => state.selFactory==='all'||w.factory===state.selFactory).map(w => w.dept))].sort();
  const subOrgOptions  = [...new Set(workerPool
    .filter(w => (state.selFactory==='all'||w.factory===state.selFactory) &&
                 (state.selDept==='all'||w.dept===state.selDept)).map(w => w.subOrg).filter(Boolean))].sort();
  const filteredWorkers = workerPool.filter(w =>
    (state.selFactory==='all'||w.factory===state.selFactory) &&
    (state.selDept==='all'||w.dept===state.selDept) &&
    (state.selSubOrg==='all'||w.subOrg===state.selSubOrg) &&
    (!q || w.name.includes(q) || (w.id||'').toLowerCase().includes(q.toLowerCase()) ||
           (w.employeeId||'').includes(q))
  );
  const selW = (state.selectedWorkerId && workerPool.find(w => w.id===state.selectedWorkerId)) ||
               filteredWorkers[0] || null;
  const personalRecords = selW ? (() => {
    if (state.xlsRecords.length > 0) {
      // Excel mode: use xlsRecords for this worker
      const wid = selW.id || selW.employeeId;
      const rows = state.xlsRecords.filter(r => r.workerId === wid);
      // deduplicate by typeName, keep latest issueDate
      const cur = {};
      rows.forEach(r => { if (!cur[r.typeName]||r.issueDate>cur[r.typeName].issueDate) cur[r.typeName]=r; });
      return Object.values(cur).map(r => deriveXls(r));
    }
    const wcur = {};

// ─── DEPT LEDGER ──────────────────────────────────────────────────────────────
function renderDept() {
  const c = computed();
  const allWorkers = state.workers;
  const factoryOpts = [...new Set(allWorkers.map(w => w.factory))].sort();
  const deptOpts    = [...new Set(allWorkers
    .filter(w => state.deptSelFactory==='all'||w.factory===state.deptSelFactory)
    .map(w => w.dept))].sort();
  const subOrgOpts  = [...new Set(allWorkers
    .filter(w => (state.deptSelFactory==='all'||w.factory===state.deptSelFactory)
              && (state.deptSelDept==='all'||w.dept===state.deptSelDept))
    .map(w => w.subOrg).filter(Boolean))].sort();
  const filtered = allWorkers.filter(w =>
    (state.deptSelFactory==='all'||w.factory===state.deptSelFactory) &&
    (state.deptSelDept==='all'||w.dept===state.deptSelDept) &&
    (state.deptSelSubOrg==='all'||w.subOrg===state.deptSelSubOrg)
  );
  const filterLabel = [
    state.deptSelFactory!=='all'?state.deptSelFactory:'',
    state.deptSelDept!=='all'?state.deptSelDept:'',
    state.deptSelSubOrg!=='all'?state.deptSelSubOrg:'',
  ].filter(Boolean).join(' > ') || '전체';
  return `

  <div class="card">
    <div class="card-hd">
      <div class="card-hd-left"><span class="sec-marker">▶</span><span class="sec-title">조직 선택</span></div>

          ${factoryOpts.map(o=>`<option value="${esc(o)}"${state.deptSelFactory===o?' selected':''}>${esc(o)}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:160px;">
        <span style="font-size:11px;font-weight:600;color:#9aa3ac;white-space:nowrap;">부서</span>
        <select class="form-select" style="flex:1;" id="dept-sel-dept">
          <option value="all">전체</option>
          ${deptOpts.map(o=>`<option value="${esc(o)}"${state.deptSelDept===o?' selected':''}>${esc(o)}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:160px;">
        <span style="font-size:11px;font-weight:600;color:#9aa3ac;white-space:nowrap;">하위조직</span>
        <select class="form-select" style="flex:1;" id="dept-sel-suborg">
          <option value="all">전체</option>
          ${subOrgOpts.map(o=>`<option value="${esc(o)}"${state.deptSelSubOrg===o?' selected':''}>${esc(o)}</option>`).join('')}
        </select>
      </div>
      <button class="btn-green" id="btn-export">⬇ 엑셀 내보내기</button>
    </div>

  <div class="card">
    <div class="card-hd">
      <div class="card-hd-left"><span class="sec-marker">▶</span><span class="sec-title">보호구 지급 매트릭스</span></div>
      <span class="card-meta">${esc(filterLabel)} · ${filtered.length}명 · ${state.ppeTypes.length}종</span>
    </div>

      ? emptyState('🏭', '부서 데이터가 없습니다.<br>Firestore <b>workers</b> 컬렉션에 작업자를 추가해주세요.')

      <thead><tr>
        <th style="position:sticky;left:0;background:#f2f3f5;width:160px;">작업자</th>
        ${state.ppeTypes.map(t=>`<th class="tc" style="border-left:1px solid #eceef0;font-size:11px;">${esc(t.name)}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${filtered.map(w=>`<tr>
          <td style="position:sticky;left:0;background:#fff;padding:6px 10px;">
            <div style="font-size:12.5px;font-weight:600;color:#2b3138;">${esc(w.name)}</div>
            <div style="font-size:10px;color:#9aa3ac;">${esc(w.dept)} · ${esc(w.subOrg||'')}</div>
          </td>

            const r = c.curByKey[w.id+'|'+t.id];

                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">

                      <span style="width:7px;height:7px;border-radius:50%;background:${r.dot};"></span>${esc(r.label)}

              : `<td class="tc" style="border-left:1px solid #f4f5f6;padding:6px 8px;"><span style="color:#d2d6db;font-size:13px;">–</span></td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`}
  </div>
</div>`;
}

  if (state.alarmDept   !== 'all') alarmRows = alarmRows.filter(r => r.dept   === state.alarmDept);

// debounce map for master field writes
const masterDebounce = {};

function bindMasterEvents() {
  document.getElementById('btn-add-type')?.addEventListener('click', async () => {
    try {
      await addDoc(collection(db, 'ppeTypes'), { name:'새 보호구', months:12, alarmDays:14, note:'' });
      showToast('보호구 기준 행을 추가했습니다. (Firestore 저장됨)');
    } catch (err) { showToast('추가 실패: '+err.message); }
  });

  document.getElementById('master-tbody')?.addEventListener('input', ev => {
    const inp = ev.target;
    const row = inp.closest('tr[data-type-id]');
    if (!row) return;
    const tid   = row.dataset.typeId;
    const field = inp.dataset.field;
    if (!field) return;
    // update local state immediately (no re-render → no focus loss)
    const t = state.ppeTypes.find(x => x.id === tid);
    if (t) t[field] = (field === 'months' || field === 'alarmDays') ? (parseInt(inp.value,10)||0) : inp.value;
    // debounced Firestore write
    clearTimeout(masterDebounce[tid+'_'+field]);
    masterDebounce[tid+'_'+field] = setTimeout(async () => {
      try {
        await updateDoc(doc(db, 'ppeTypes', tid), { [field]: t ? t[field] : inp.value });
      } catch (err) { showToast('저장 실패: '+err.message); }
    }, 600);
  });

  document.getElementById('master-tbody')?.addEventListener('click', async ev => {
    const btn = ev.target.closest('.remove-type');
    if (!btn) return;
    const tid = btn.dataset.typeId;
    if (!confirm('이 보호구 기준을 삭제하시겠습니까?')) return;
    try {
      await deleteDoc(doc(db, 'ppeTypes', tid));
    } catch (err) { showToast('삭제 실패: '+err.message); }
  });
}

// ─── Excel upload (fallback, local-only) ─────────────────────────────────────
function handleXlsUpload(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (rows.length < 2) { showToast('데이터 행이 없습니다.'); return; }

      // Detect header row (find row containing 사번 or 성명)
      let hdrIdx = 0;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        if (rows[i].some(c => String(c).includes('사번') || String(c).includes('성명'))) { hdrIdx = i; break; }
      }
      const hdr = rows[hdrIdx].map(c => String(c).trim());
      const col = name => {
        const syns = { '사번':['사번','사원번호','EMP_ID','empId'],
                       '성명':['성명','이름','name','작업자'],
                       '공장':['공장','factory'],
                       '부서':['부서','부서명','dept'],
                       '하위조직':['하위조직','공정','subOrg','팀','조직'],
                       '보호구':['보호구','보호구종류','보호구명','PPE','종류'],
                       '지급일':['지급일','지급날짜','issueDate','최근지급일'],
                       '수량':['수량','qty','개수'],
                       '만료예정일':['만료예정일','만료일','expiryDate','교체예정일'],
                       '출고번호':['출고번호','outNo','출고No'] }[name] || [name];
        return hdr.findIndex(h => syns.some(s => h.includes(s)));
      };
      const ci = { 사번:col('사번'), 성명:col('성명'), 공장:col('공장'), 부서:col('부서'),
                   하위조직:col('하위조직'), 보호구:col('보호구'), 지급일:col('지급일'),
                   수량:col('수량'), 만료예정일:col('만료예정일'), 출고번호:col('출고번호') };

      const workers = {}, records = [];
      for (let i = hdrIdx + 1; i < rows.length; i++) {
        const r = rows[i];
        const empId = String(r[ci.사번]||'').trim();
        const name  = String(r[ci.성명]||'').trim();
        if (!empId || !name) continue;
        const ppe   = String(r[ci.보호구]||'').trim();
        if (!ppe) continue;
        if (!workers[empId]) {
          workers[empId] = {
            id: empId, employeeId: empId, name,
            factory: ci.공장>=0 ? String(r[ci.공장]||'').trim() : '',
            dept:    ci.부서>=0 ? String(r[ci.부서]||'').trim() : '',
            subOrg:  ci.하위조직>=0 ? String(r[ci.하위조직]||'').trim() : '',
          };
        }
        const rawIssue  = r[ci.지급일];
        const rawExpiry = ci.만료예정일>=0 ? r[ci.만료예정일] : '';
        const issueDate  = rawIssue  instanceof Date ? fmtDate(rawIssue)  : String(rawIssue||'').trim();
        const expiryDate = rawExpiry instanceof Date ? fmtDate(rawExpiry) : String(rawExpiry||'').trim();
        records.push({
          workerId:   empId,
          typeName:   ppe,
          issueDate:  issueDate,
          expiryDate: expiryDate || '',
          qty:        ci.수량>=0 ? (r[ci.수량]||1) : 1,
          outNo:      ci.출고번호>=0 ? String(r[ci.출고번호]||'').trim() : '',
        });
      }
      state.xlsWorkers  = Object.values(workers);
      state.xlsRecords  = records;
      state.xlsFileName = file.name;
      // select first worker from xls
      if (state.xlsWorkers.length > 0) state.selectedWorkerId = state.xlsWorkers[0].id;
      renderScreen();
      showToast(`Excel 로드 완료 — 작업자 ${state.xlsWorkers.length}명, 지급이력 ${records.length}건`);
    } catch(err) {
      showToast('Excel 파싱 오류: ' + err.message);
    }
    ev.target.value = '';
  };
  reader.readAsBinaryString(file);
}

function downloadXlsTemplate() {
  if (typeof XLSX === 'undefined') { showToast('SheetJS 라이브러리가 로드되지 않았습니다.'); return; }

  // PPE 기준 목록 (Firestore 우선, 없으면 내장 시드)
  const ppeTypeList = state.ppeTypes.length > 0 ? state.ppeTypes : PPE_SEED_DATA;
  const ppeNames = ppeTypeList.map(t => t.name);

  // ── 숨김 시트: PPE기준 (VLOOKUP 참조용 — 보호구명:사용월수) ─────────────────
  const wsRef = XLSX.utils.aoa_to_sheet(ppeTypeList.map(t => [t.name, t.months || 0]));
  wsRef['!cols'] = [{wch:22},{wch:6}];

  // ── Sheet 1: 지급대장 ────────────────────────────────────────────────────────
  const HDR1 = ['사번','성명','공장','부서','하위조직','보호구종류','지급일','수량','만료예정일','출고번호'];
  // 만료예정일 자동계산 공식: 보호구 사용월수 VLOOKUP → EDATE, 0월=성능소진형
  const expiryFml = r =>
    `IFERROR(IF(OR(F${r}="",G${r}=""),"",` +
    `IF(VLOOKUP(F${r},PPE기준!$A:$B,2,0)=0,"성능소진시",` +
    `TEXT(EDATE(IF(ISNUMBER(G${r}),G${r},DATEVALUE(G${r})),` +
    `VLOOKUP(F${r},PPE기준!$A:$B,2,0)),"YYYY-MM-DD"))),"")`;

  const ws1 = XLSX.utils.aoa_to_sheet([HDR1]);
  ws1['!cols'] = [14,10,10,16,14,18,12,6,14,20].map(w=>({wch:w}));

  // 예시 행 2개 (보호구종류 각각 첫번째·두번째)
  const ex1 = [String(199911098),'홍길동','PVC공장','PVC생산1팀','사무실',ppeNames[0]||'안전모','2024-01-15','1',null,''];
  const ex2 = [String(199911098),'홍길동','PVC공장','PVC생산1팀','사무실',ppeNames[1]||'안전화','2024-01-15','1',null,''];
  XLSX.utils.sheet_add_aoa(ws1, [ex1, ex2], {origin:{r:1,c:0}});

  // 만료예정일 셀에 수식 직접 설정 (I열 = index 8)
  ws1['I2'] = { t:'f', f: expiryFml(2) };
  ws1['I3'] = { t:'f', f: expiryFml(3) };

  // 보호구종류(F열) 드롭다운 데이터 유효성 검사
  ws1['!dataValidation'] = [{
    type: 'list',
    sqref: 'F2:F50000',
    formula1: `"${ppeNames.join(',')}"`,
    showDropDown: false,
    showErrorMessage: true,
    errorStyle: 'stop',
    errorTitle: '입력 오류',
    error: `보호구 기준정보에 등록된 종류를 선택하세요.\n(${ppeNames.join(', ')})`
  }];

  // ── Sheet 2: 작업자 LIST — 사번~하위조직(A~E열)만, F열 이후 없음 ──────────────
  const HDR2 = ['사번','성명','공장','부서','하위조직'];
  let workerSource = state.workers && state.workers.length > 0
    ? state.workers
    : WORKER_SEED_DATA.map(w => ({ employeeId:w.e, name:w.n, factory:w.f, dept:w.d, subOrg:w.s }));

  const sorted = [...workerSource].sort((a,b)=>{
    const fa=a.factory||'', fb=b.factory||'';
    if (fa!==fb) return fa<fb?-1:1;
    const da=a.dept||'', db=b.dept||'';
    if (da!==db) return da<db?-1:1;
    const sa=a.subOrg||'', sb=b.subOrg||'';
    if (sa!==sb) return sa<sb?-1:1;
    return (a.name||'').localeCompare(b.name||'', 'ko');
  });

  const ws2Rows = [HDR2, ...sorted.map(w => [
    String(w.employeeId||w.id||''), w.name||'', w.factory||'', w.dept||'', w.subOrg||''
  ])];
  const ws2 = XLSX.utils.aoa_to_sheet(ws2Rows);
  ws2['!cols'] = [14,10,12,16,16].map(w=>({wch:w}));

  // ── 워크북 조립 ─────────────────────────────────────────────────────────────
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws1, '지급대장');
  XLSX.utils.book_append_sheet(wb, ws2, '작업자 LIST');
  XLSX.utils.book_append_sheet(wb, wsRef, 'PPE기준');

  // PPE기준 시트 숨김 처리
  wb.Workbook = wb.Workbook || {};
  wb.Workbook.Sheets = wb.Workbook.Sheets || [];
  wb.Workbook.Sheets[2] = { Hidden: 1 };

  XLSX.writeFile(wb, 'PPE지급대장_업로드양식.xlsx');
  showToast(`양식 다운로드 완료 — 보호구 ${ppeNames.length}종 · 작업자 ${sorted.length}명`);
}

// ─── Bulk records upload ──────────────────────────────────────────────────────
function parseBulkRecordsFile(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, { type:'binary', cellDates:true });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (rows.length < 2) { showToast('데이터 행이 없습니다.'); return; }

      // find header row
      let hdrIdx = 0;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        if (rows[i].some(c => /사번|사원/.test(String(c)))) { hdrIdx = i; break; }
      }
      const hdr = rows[hdrIdx].map(c => String(c).trim());
      const cidx = kw => hdr.findIndex(h => kw.some(k => h.includes(k)));
      const ci = {
        empId:    cidx(['사번','사원번호','EMP']),
        typeName: cidx(['보호구','PPE','종류']),
        issueDate:cidx(['지급일','지급날짜','issue']),
        qty:      cidx(['수량','qty','개수']),
        outNo:    cidx(['출고번호','출고No','outNo']),
      };

      // build lookup maps
      const workerByEmpId = {};
      state.workers.forEach(w => { if (w.employeeId) workerByEmpId[w.employeeId.trim()] = w; });
      const ppeByName = {};
      state.ppeTypes.forEach(t => { ppeByName[t.name.trim()] = t; });

      const preview = [];
      for (let i = hdrIdx+1; i < rows.length; i++) {
        const r = rows[i];
        const empId    = String(r[ci.empId]    ??'').trim();
        const typeName = String(r[ci.typeName] ??'').trim();
        const rawDate  = ci.issueDate>=0 ? r[ci.issueDate] : '';
        const issueDate = rawDate instanceof Date ? fmtDate(rawDate) : String(rawDate||'').trim();
        const qty      = ci.qty>=0  ? (Number(r[ci.qty])||1)   : 1;
        const outNo    = ci.outNo>=0? String(r[ci.outNo]||'').trim() : '';
        if (!empId && !typeName) continue;

        const worker = workerByEmpId[empId];
        const ppeType = ppeByName[typeName] ||
          Object.values(ppeByName).find(t => t.name.includes(typeName)||typeName.includes(t.name));
        let status='매칭됨', reason='';
        if (!empId)                     { status='스킵'; reason='사번 없음'; }
        else if (!typeName)             { status='스킵'; reason='보호구명 없음'; }
        else if (!issueDate)            { status='스킵'; reason='지급일 없음'; }
        else if (!worker)               { status='작업자 없음'; reason='사번 '+empId+' 미등록'; }
        else if (!ppeType)              { status='보호구 없음'; reason='"'+typeName+'" 기준정보 없음'; }

        preview.push({
          rowNum: i-hdrIdx, empId, name: worker?.name||'', typeName, issueDate, qty, outNo,
          workerId: worker?.id||null, typeId: ppeType?.id||null,
          status, reason,
        });
      }
      const matched = preview.filter(r=>r.status==='매칭됨').length;
      const skipped = preview.length - matched;
      state.bulkPreview = { rows:preview, matched, skipped, fileName:file.name };
      renderScreen();
      showToast(`파일 분석 완료 — 매칭 ${matched}건 / 스킵 ${skipped}건`);
    } catch(err) {
      showToast('파싱 오류: '+err.message);
    }
    ev.target.value='';
  };
  reader.readAsBinaryString(file);
}

async function commitBulkRecords() {
  if (!state.bulkPreview) return;
  const btn  = document.getElementById('btn-bulk-records-commit');
  const prog = document.getElementById('bulk-records-progress');
  if (!btn||!prog) return;
  const toWrite = state.bulkPreview.rows.filter(r=>r.status==='매칭됨');
  if (toWrite.length===0) { showToast('등록할 항목이 없습니다.'); return; }

  btn.disabled = true;
  prog.style.display = 'block';
  prog.style.color = '#F5821F';
  prog.textContent = `Firestore에 ${toWrite.length}건 등록 중...`;

  try {
    const BATCH = 400;
    let written=0, batchInst=writeBatch(db), opCount=0;
    const isoNow = new Date().toISOString();
    for (const r of toWrite) {
      batchInst.set(doc(collection(db,'records')), {
        workerId:   r.workerId,
        typeId:     r.typeId,
        qty:        r.qty,
        issueDate:  r.issueDate,
        outNo:      r.outNo || ('BULK-'+r.issueDate+'-'+String(++written).padStart(3,'0')),
        createdAt:  isoNow,
      });
      opCount++; written++;
      if (opCount===BATCH) {
        await batchInst.commit();
        batchInst=writeBatch(db); opCount=0;
        prog.textContent=`등록 중... ${written}/${toWrite.length}건`;
      }
    }
    if (opCount>0) await batchInst.commit();

    // write sync log
    await addDoc(collection(db,'syncLog'),{
      time: fmtNow(), type:'일괄 지급등록', count:String(toWrite.length),
      detail: state.bulkPreview.fileName+' 업로드 ('+toWrite.length+'건)',
      status:'성공', createdAt:isoNow,
    });

    prog.textContent=`✔ 완료: ${toWrite.length}건 Firestore 등록 완료`;
    prog.style.color='#2f9e5b';
    showToast(`지급내역 ${toWrite.length}건을 Firestore에 등록했습니다.`);
    state.bulkPreview=null;
    setTimeout(()=>renderScreen(), 1200);
  } catch(err) {
    prog.textContent='오류: '+err.message;
    prog.style.color='#d63b30';
    showToast('등록 실패: '+err.message);
    btn.disabled=false;
  }
}

  ]);

  // Firestore workers 우선, 없으면 내장 시드 데이터(479명) 사용
  let workerSource = state.workers;

    workerSource = WORKER_SEED_DATA.map(w => ({
      employeeId: w.e, name: w.n, factory: w.f, dept: w.d, subOrg: w.s
    }));

    String(w.employeeId||w.id||''), w.name||'', w.factory||'', w.dept||'', w.subOrg||''

  const ws2 = XLSX.utils.aoa_to_sheet(workerRows);

  // ── 워크북 조립 ──────────────────────────────────────────────────────────

  XLSX.utils.book_append_sheet(wb, ws1, '지급내역업로드');
  XLSX.utils.book_append_sheet(wb, ws2, '작업자목록');
  XLSX.writeFile(wb, 'PPE지급내역_일괄업로드양식.xlsx');
  const msg = usingFallback
    ? `양식 다운로드 완료 — 내장 작업자 ${sorted.length}명 포함 (Firestore 미등록 상태)`
    : `양식 다운로드 완료 — 작업자 ${sorted.length}명 포함`;
  showToast(msg);
}

// ─── Firestore write: bulk import workers ────────────────────────────────────
async function importWorkers() {
  const btn = document.getElementById('btn-import-workers');
  const prog = document.getElementById('import-progress');
  if (!btn || !prog) return;
  if (!confirm('기존 작업자 데이터를 모두 삭제하고 479명을 새로 등록합니다.\n계속하시겠습니까?')) return;

  btn.disabled = true;
  btn.textContent = '처리 중...';
  prog.style.display = 'block';
  prog.textContent = '① 기존 작업자 데이터 삭제 중...';

  try {
    // 1. delete all existing workers
    const snap = await getDocs(collection(db, 'workers'));
    const BATCH_SIZE = 400;
    let batch = writeBatch(db);
    let opCount = 0;
    for (const d of snap.docs) {
      batch.delete(d.ref);
      opCount++;
      if (opCount === BATCH_SIZE) {
        await batch.commit();
        batch = writeBatch(db);
        opCount = 0;
      }
    }
    if (opCount > 0) await batch.commit();

    // 2. write all seed workers
    const total = WORKER_SEED_DATA.length;
    let written = 0;
    batch = writeBatch(db);
    opCount = 0;
    for (const w of WORKER_SEED_DATA) {
      const ref = doc(collection(db, 'workers'));
      batch.set(ref, {
        factory:    w.f,
        dept:       w.d,
        subOrg:     w.s,
        name:       w.n,
        employeeId: w.e,
      });
      opCount++;
      written++;
      if (opCount === BATCH_SIZE) {
        await batch.commit();
        batch = writeBatch(db);
        opCount = 0;
        prog.textContent = `② 작업자 등록 중... ${written}/${total}명`;
      }
    }
    if (opCount > 0) await batch.commit();

    prog.textContent = `✔ 완료: 작업자 ${total}명 등록 완료`;
    prog.style.color = '#2f9e5b';
    showToast(`작업자 ${total}명을 Firestore에 등록했습니다.`);
  } catch (err) {
    prog.textContent = '오류: ' + err.message;
    prog.style.color = '#d63b30';
    showToast('등록 실패: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ 작업자 479명 일괄 등록';
  }
}

      pre1: state.pre1, pre2: state.pre2,
      chEmail: state.chEmail, chSms: state.chSms, chApp: state.chApp,
      lastSync: state.lastSync, shipSeq: state.shipSeq,
    }, { merge: true });
    showToast('알람 기준을 저장했습니다. ('+state.pre1+'일 · '+state.pre2+'일 전)');
  } catch (err) { showToast('저장 실패: '+err.message); }
}

// ─── Firestore write: shipment simulation ─────────────────────────────────────
let flashTimer = null;
async function addShipment() {
  if (state.workers.length === 0) { showToast('작업자 데이터가 없습니다. Firestore workers 컬렉션에 작업자를 추가해주세요.'); return; }
  if (state.ppeTypes.length === 0){ showToast('보호구 기준정보가 없습니다. 먼저 보호구 종류를 추가해주세요.'); return; }

  const w   = state.workers[Math.floor(Math.random() * state.workers.length)];
  const t   = state.ppeTypes[Math.floor(Math.random() * state.ppeTypes.length)];
  const seq = (state.shipSeq || 0) + 1;
  const todayStr = fmtDate(new Date());
  const outNo    = 'OUT-' + todayStr.replace(/-/g,'') + '-' + String(seq).padStart(3,'0');
  const timeStr  = fmtNow();
  const isoNow   = new Date().toISOString();

  const rec = { workerId:w.id, typeId:t.id, qty:t.id==='gloves'?5:(t.id==='earplug'?10:1), issueDate:todayStr, outNo, createdAt:isoNow };
  const log = { time:timeStr, type:'자동', count:1, detail:`${w.dept} ${w.name} ${t.name} 출고 반영`, status:'성공', createdAt:isoNow };

  try {
    const recRef = await addDoc(collection(db, 'records'), rec);
    await addDoc(collection(db, 'syncLog'), log);
    await setDoc(doc(db, 'settings', 'main'),
      { lastSync:timeStr, shipSeq:seq }, { merge:true });

    state.flashId = recRef.id;
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => { state.flashId = null; }, 2600);
    showToast(`출고 연동 완료 — ${w.name} / ${t.name} 지급 이력이 Firestore에 저장되었습니다.`);
  } catch (err) { showToast('시뮬레이션 실패: '+err.message); }
}

// ─── global events ────────────────────────────────────────────────────────────
document.getElementById('toggle-sb').addEventListener('click', () => {
  state.collapsed = !state.collapsed; updateSidebar();
});
document.getElementById('sb-nav').addEventListener('click', ev => {
  const item = ev.target.closest('[data-nav]');
  if (!item) return;
  state.screen = item.dataset.nav;
  updateSidebar(); updateTopbar(); renderScreen();
});
</script>
